# AnoLLM published AUROC reference — the reproduction target for the M1 gate (GATE_SPEC.md).
#
# SOURCE (eyes-on, exact): AnoLLM, Tsai et al., ICLR 2025 (proceedings PDF hash 165bbd0a...).
#   - per-dataset MEAN AUC-ROC  : Table 10, page 26, column "AnoLLM / 360M" (SmolLM-360M backbone).
#   - per-dataset STANDARD ERROR: Table 11, page 27, column "AnoLLM / 360M" (SE over 5 random splits).
# Extracted via pdftotext (exact digits, not image OCR) and cross-checked against the rendered table.
# SELF-CHECK: mean of the 30 per-dataset values below = 0.8651, matching the paper's reported Average 0.865.
# MODEL MATCH: our gate runs SmolLM-360M, so we use the paper's 360M column directly (no version mismatch).
#
# NOTE on `std`: the paper reports standard ERROR (SE over 5 splits). The run-to-run std = SE*sqrt(5)
# (n=5). We store both `se` (as published) and `std` (= SE*sqrt(5)) for the GATE_SPEC C3 +/-1std band.
# CAVEAT: many 360M SEs are ~0, so the +/-1std band collapses for several datasets -> C3 is stringent;
# see GATE_SPEC / the verdict notes (the gate leans on C1 mean + C2 rank; C3 is the strict supplementary check).
# ForestCover (paper) == covertype (our ODDS name).

model: smol-360
metric: auroc
dataset_suite: odds-30
n_splits_ref: 5
aggregate_mean: 0.865   # Table 10 Average, 360M (also matches Table 3a size ablation)

per_dataset:
  annthyroid:         {mean: 0.931, se: 0.001, std: 0.0022}
  arrhythmia:         {mean: 0.822, se: 0.004, std: 0.0089}
